title: macproposal
author: Michael J. Carter
version: 0.0.1
quarto-required: ">=1.6.0"
contributes: 
  formats: 
    pdf:
      documentclass: article
      pdf-engine: xelatex
      papersize: letter
      fontsize: 11pt
      geometry:
        - left=1.9cm # or 2.54 cm for 1 in
        - bottom=1.9cm
        - top=1.9cm
        - right=1.9cm
        - includehead
      linestretch: 1.15
      #mainfont: Times New Roman
      #indent: true
      template-partials:
        - after-body.tex
        - before-body.tex
        - before-title.tex